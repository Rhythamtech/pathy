version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: pathy-backend:latest
    container_name: pathy-backend
    ports:
      - "7777:7777"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=7777
      - DEBUG=false
    restart: always

  frontend:
    build:
      context: ./agentui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:7777}
    image: pathy-frontend:latest
    container_name: pathy-frontend
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    restart: always
