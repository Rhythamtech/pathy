version: '3.8'

networks:
  pathy-network:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: pathy-backend-dev:latest
    container_name: pathy-backend-dev
    ports:
      - "7777:7777"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=7777
      - DEBUG=true
    volumes:
      - .:/app
      - /app/.venv # Don't overwrite the container's virtual environment with host's
    restart: always
    networks:
      - pathy-network

  frontend:
    build:
      context: ./agentui
      dockerfile: Dockerfile
      args:
        # In dev, defaults to localhost:7777 (both running on same machine)
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:7777}
    image: pathy-frontend-dev:latest
    # Overwrite production command to use dev server for hot reloading
    command: npm run dev
    container_name: pathy-frontend-dev
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      - ./agentui:/app
      - /app/node_modules # Don't overwrite container's node_modules with host's
      - /app/.next # Don't overwrite container's build folder
    depends_on:
      - backend
    restart: always
    networks:
      - pathy-network
